services:
  ythril:
    build: .
    container_name: ythril
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      # Config and secrets — keep outside image, mode 0600 enforced at startup
      - ./config:/config
      # Persistent data: files + MongoDB brain
      - ythril-data:/data
    environment:
      CONFIG_PATH: /config/config.json
      DATA_ROOT: /data
      MONGO_URI: mongodb://ythril-mongo:27017
      NODE_ENV: production
    depends_on:
      ythril-mongo:
        condition: service_healthy
    networks:
      - ythril-internal

  ythril-mongo:
    # mongodb/mongodb-atlas-local includes mongot — required for $vectorSearch
    image: mongodb/mongodb-atlas-local:latest
    container_name: ythril-mongo
    restart: unless-stopped
    volumes:
      - ythril-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - ythril-internal

volumes:
  ythril-data:
  ythril-mongo-data:

networks:
  ythril-internal:
    driver: bridge
    internal: false   # set true to isolate; open for external embedding endpoint access
